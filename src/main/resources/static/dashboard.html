<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavach - Disaster Command Center</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styling for the search filters row */
        .filter-bar {
            display: flex;
            gap: 15px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .filter-bar input, .filter-bar select {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .filter-bar input { flex: 1; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>🛸 Live Emergency Triage Queue</h1>
            <span style="background: #334155; padding: 8px 15px; border-radius: 8px; font-size: 14px;">
                🔴 Autorefresh Active
            </span>
        </div>
        <div style="display: flex; gap: 15px; margin-bottom: 20px; width: 100%;">
        <div style="flex: 1; background: #ef4444; padding: 15px; border-radius: 8px; text-align: center;">
            <div style="font-size: 12px; font-weight: bold; text-transform: uppercase; opacity: 0.8;">Critical Threats</div>
            <div id="statCritical" style="font-size: 28px; font-weight: bold; margin-top: 5px;">0</div>
        </div>
        <div style="flex: 1; background: #3b82f6; padding: 15px; border-radius: 8px; text-align: center;">
            <div style="font-size: 12px; font-weight: bold; text-transform: uppercase; opacity: 0.8;">Active Records</div>
            <div id="statTotal" style="font-size: 28px; font-weight: bold; margin-top: 5px;">0</div>
        </div>
        <div style="flex: 1; background: #06b6d4; padding: 15px; border-radius: 8px; text-align: center;">
            <div style="font-size: 12px; font-weight: bold; text-transform: uppercase; opacity: 0.8;">Medical Cases</div>
            <div id="statMedical" style="font-size: 28px; font-weight: bold; margin-top: 5px;">0</div>
        </div>
    </div>
</div>

        <!-- NEW: Real-time Interactive Filter Bar -->
        <div class="filter-bar">
            <input type="text" id="searchBar" placeholder="Search keywords (e.g. 'elderly', 'trapped', 'water')..." oninput="fetchLiveQueue()">
            
            <select id="priorityFilter" onchange="fetchLiveQueue()">
                <option value="">All Priorities</option>
                <option value="CRITICAL">Critical Only</option>
                <option value="MEDIUM">Medium Only</option>
                <option value="LOW">Low Only</option>
            </select>

            <select id="categoryFilter" onchange="fetchLiveQueue()">
                <option value="">All Categories</option>
                <option value="MEDICAL">Medical</option>
                <option value="FLOOD">Flood</option>
                <option value="RESCUE">Rescue</option>
                <option value="BLOCKAGE">Blockage</option>
                <option value="OTHER">Other</option>
            </select>
        </div>

        <div id="queueContainer">
            <p style="text-align: center; color: var(--text-muted)">Waiting for real-time distress signals...</p>
        </div>
    </div>

    <script>
        const knownTicketIds = new Set();
        let alarmAudioContext = null;

        async function fetchLiveQueue() {
            // Grab current values from UI inputs
            const search = document.getElementById('searchBar').value;
            const priority = document.getElementById('priorityFilter').value;
            const category = document.getElementById('categoryFilter').value;

            // Build dynamic query parameters
            let url = 'http://localhost:8082/api/tickets/live?';
            if (search) url += `search=${encodeURIComponent(search)}&`;
            if (priority) url += `priority=${priority}&`;
            if (category) url += `category=${category}&`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                const tickets = await response.json();
                const container = document.getElementById('queueContainer');

                if (Array.isArray(tickets)) {
                    tickets.forEach(ticket => {
                        if (!ticket || ticket.id === undefined || ticket.id === null) {
                            return;
                        }

                        if (!knownTicketIds.has(ticket.id) && ticket.priority === 'CRITICAL') {
                            playCriticalAlarm();
                        }

                        knownTicketIds.add(ticket.id);
                    });
                }
                
                if (!Array.isArray(tickets) || tickets.length === 0) {
                    container.innerHTML = `<p style="text-align: center; color: var(--text-muted)">No matching emergency tickets found in the stack.</p>`;
                    return;
                }

                container.innerHTML = tickets.map(ticket => {
                    ticket = ticket && typeof ticket === 'object' ? ticket : {};
                    const priority = safeText(ticket.priority, 'MEDIUM');
                    const category = safeText(ticket.category, 'OTHER');
                    const summary = safeText(ticket.summary, 'Emergency logged.');
                    const rawMessage = safeText(ticket.rawMessage, 'No raw SOS message captured.');
                    const id = safeText(ticket.id, '');
                    const latitude = safeCoordinate(ticket.latitude);
                    const longitude = safeCoordinate(ticket.longitude);

                    return `
                    <div class="ticket-card ${priority}">
                        <span class="badge ${priority}">${priority}</span>
                        <h3 style="margin: 0 0 10px 0; color: #fff;">[${category}] Emergency Resource Request</h3>
                        <p style="margin: 5px 0; color: #e2e8f0;"><strong>AI Triage Verdict:</strong> ${summary}</p>
                        <p style="margin: 5px 0; font-size: 14px; color: var(--text-muted)"><strong>Raw SOS Message:</strong> "${rawMessage}"</p>
                        <p style="margin: 5px 0; font-size: 14px; color: var(--text-muted)"><strong>Coordinates:</strong> ${latitude}, ${longitude}</p>
                        <button class="resolve-btn" onclick="resolveTicket('${id}')">Mark Resolved & Clear Route</button>
                    </div>
                `;
                }).join('');
            } catch (error) {
                console.error("Failed fetching live emergency queue matrix.", error);
                document.getElementById('queueContainer').innerHTML = `<p style="text-align: center; color: var(--text-muted)">Live queue is unavailable. Check that the Spring Boot API is running on port 8082.</p>`;
            }
        }

        async function resolveTicket(id) {
            try {
                await fetch(`http://localhost:8082/api/tickets/${id}/resolve`, { method: 'DELETE' });
                fetchLiveQueue(); 
            } catch (error) {
                alert("Could not process ticket resolution.");
            }
        }
        async function updateAnalyticsCounters() {
        try {
            const response = await fetch('http://localhost:8082/api/tickets/stats');
            if (!response.ok) {
                throw new Error(`API returned ${response.status}`);
            }
            const statsPayload = await response.json();
            const stats = statsPayload && typeof statsPayload === 'object' ? statsPayload : {};
        
            document.getElementById('statCritical').innerText = safeNumber(stats.critical);
            document.getElementById('statTotal').innerText = safeNumber(stats.totalActive);
            document.getElementById('statMedical').innerText = safeNumber(stats.medical);
        } catch (error) {
            console.error("Analytics fetch offline.", error);
        }
    }

        function getAlarmAudioContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                return null;
            }

            if (!alarmAudioContext) {
                alarmAudioContext = new AudioContextClass();
            }

            return alarmAudioContext;
        }

        function playCriticalAlarm() {
            const hasUserActivated = !navigator.userActivation || navigator.userActivation.hasBeenActive;
            if (!hasUserActivated) {
                return;
            }

            const audioContext = getAlarmAudioContext();
            if (!audioContext) {
                return;
            }

            const scheduleAlarm = () => {
                const now = audioContext.currentTime;
                const masterGain = audioContext.createGain();
                masterGain.gain.setValueAtTime(0.0001, now);
                masterGain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
                masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
                masterGain.connect(audioContext.destination);

                const highTone = audioContext.createOscillator();
                highTone.type = 'sine';
                highTone.frequency.setValueAtTime(880, now);
                highTone.frequency.exponentialRampToValueAtTime(440, now + 0.18);
                highTone.connect(masterGain);
                highTone.start(now);
                highTone.stop(now + 0.32);

                const lowTone = audioContext.createOscillator();
                lowTone.type = 'triangle';
                lowTone.frequency.setValueAtTime(660, now + 0.08);
                lowTone.frequency.exponentialRampToValueAtTime(330, now + 0.3);
                lowTone.connect(masterGain);
                lowTone.start(now + 0.08);
                lowTone.stop(now + 0.32);

                highTone.onended = () => masterGain.disconnect();
            };

            if (audioContext.state === 'suspended') {
                audioContext.resume().then(scheduleAlarm).catch(() => {});
                return;
            }

            scheduleAlarm();
        }

        function safeText(value, fallback = '') {
            if (value === undefined || value === null) {
                return fallback;
            }

            const text = String(value).trim();
            return text === '' ? fallback : escapeHtml(text);
        }

        function safeNumber(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number : 0;
        }

        function safeCoordinate(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number.toFixed(6) : '0.000000';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

// Inside your existing initialization, invoke it alongside the live queue:
        updateAnalyticsCounters();
        setInterval(updateAnalyticsCounters, 3000); // Polls every 3 seconds

        // Initialize and set up background polling interval loop (every 3 seconds)
        fetchLiveQueue();
        setInterval(fetchLiveQueue, 3000);
    </script>
</body>
</html>
