<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Field Responder Command Center</title>
    <style>
        :root {
            --canvas: #0b0f19;
            --panel: #111827;
            --panel-ink: #0f1724;
            --muted: #94a3b8;
            --border: #334155;
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --white: #ffffff;
        }

        *,*::before,*::after { box-sizing: border-box; }
        html, body { min-height: 100%; margin: 0; background: var(--canvas); font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, 'Helvetica Neue', Arial, sans-serif; color: var(--white); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        .container { max-width: 1200px; margin: 28px auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; }
        .header-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.01em; }
        .subtitle { color: var(--muted); font-size: 0.94rem; }
        .tactical-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent); border: 1px solid rgba(255,255,255,0.08); font-weight: 700; color: var(--accent-emerald); box-shadow: 0 6px 20px rgba(2,6,23,0.5); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 16px; border-radius: 12px; box-shadow: 0 10px 30px rgba(2,6,23,0.35); }
        .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 800; }
        .stat-value { font-size: 1.8rem; font-weight: 900; margin-top: 8px; color: var(--white); }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .control { display: flex; flex-direction: column; gap: 6px; }
        .control label { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
        input[type="text"], select { background: #1f2937; border: 1px solid rgba(255,255,255,0.08); padding: 10px 12px; border-radius: 8px; color: var(--white); font-weight: 600; }
        input[type="text"]::placeholder { color: #94a3b8; }
        input[type="text"]:focus, select:focus { outline: none; box-shadow: 0 0 0 4px rgba(34,211,238,0.08); border-color: var(--accent-cyan); }

        #queueContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; width: 100%; }

        .incident-card { display: flex; flex-direction: column; justify-content: space-between; background: #1e293b; border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; min-height: 340px; box-shadow: 0 16px 40px rgba(0,0,0,0.25); word-break: break-word; line-height: 1.5; }
        .incident-card .meta-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
        .incident-card h2 { margin: 0; font-size: 1.05rem; line-height: 1.35; }
        .incident-card p { margin: 0; color: var(--muted); }
        .incident-card p strong { color: var(--white); }
        .incident-card .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .incident-card .actions .btn { min-width: 140px; }
        .incident-card .card-footer { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; margin-top: 18px; font-size: 0.9rem; color: var(--muted); }
        .incident-card .card-footer div { word-break: break-word; }

        .badge { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; font-weight: 800; font-size: 0.72rem; }
        .priority-pill { font-weight: 900; }

        .btn { padding: 10px 14px; border-radius: 10px; border: 0; font-weight: 800; cursor: pointer; transition: transform .14s ease, box-shadow .14s ease; text-decoration: none; text-align: center; }
        .btn-accept { background: var(--accent-emerald); color: #052e16; }
        .btn-accept:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(16,185,129,0.14); }
        .btn-resolve { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--white); }
        .btn-resolve:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(2,6,23,0.25); }
        .btn-map { background: rgba(34,211,238,0.12); border: 1px solid rgba(34,211,238,0.22); color: var(--accent-cyan); }
        .btn-map:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(34,211,238,0.14); }

        .sla-timer { display: inline-flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent); font-weight: 800; color: var(--muted); }
        .sla-timer.muted { opacity: 0.85; color: #cbd5e1; }
        @keyframes sla-pulse { 0%,100% { box-shadow: 0 0 8px rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.45); } 50% { box-shadow: 0 0 20px rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.6); } }
        .sla-breach { animation: sla-pulse 1.2s ease-in-out infinite; color: var(--accent-red); }

        .muted { color: var(--muted); }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

        @media (max-width: 640px) {
            .container { padding: 14px; }
            .title { font-size: 1.25rem; }
            .incident-card .card-footer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <div>
                    <div class="title">Field Responder Command Center</div>
                    <div class="subtitle">Live multi-region triage queue with claim handling and critical alert monitoring.</div>
                </div>
                <div class="tactical-badge">● Tactical • Live</div>
            </div>
            <div class="tactical-badge" style="background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--accent-cyan);">Autorefresh Active</div>
        </header>

        <section class="stats-grid" aria-hidden="false">
            <div class="stat-card">
                <div class="stat-label">Critical Threats</div>
                <div id="statCritical" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Records</div>
                <div id="statTotal" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Medical Cases</div>
                <div id="statMedical" class="stat-value">0</div>
            </div>
        </section>

        <section class="controls">
            <div class="control">
                <label for="searchBar">Search</label>
                <input id="searchBar" type="text" placeholder="Search keywords..." oninput="fetchLiveQueue()" />
            </div>
            <div class="control">
                <label for="regionFilter">Filter Region</label>
                <select id="regionFilter" onchange="fetchLiveQueue()">
                    <option value="">All Regions</option>
                    <option value="Bangalore">Bangalore</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Global">Global</option>
                </select>
            </div>
            <div class="control">
                <label for="priorityFilter">Priority</label>
                <select id="priorityFilter" onchange="fetchLiveQueue()">
                    <option value="">All Priorities</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                </select>
            </div>
            <div class="control">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter" onchange="fetchLiveQueue()">
                    <option value="">All Categories</option>
                    <option value="MEDICAL">Medical</option>
                    <option value="FLOOD">Flood</option>
                    <option value="RESCUE">Rescue</option>
                    <option value="BLOCKAGE">Blockage</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
        </section>

        <main>
            <section id="queueContainer">
                <p class="stat-card" style="text-align:center;color:var(--muted);">Waiting for real-time distress signals...</p>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8082';
        const knownOpenCriticalTicketIds = new Set();
        let alarmAudioContext = null;
        const ticketTimestamps = {};

        async function fetchLiveQueue() {
            const search = document.getElementById('searchBar').value.trim();
            const priority = document.getElementById('priorityFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const selectedRegion = document.getElementById('regionFilter').value;
            const params = new URLSearchParams();

            if (search) params.set('search', search);
            if (priority) params.set('priority', priority);
            if (category) params.set('category', category);

            try {
                const response = await fetch(`/api/tickets/live?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const payload = await response.json();
                const tickets = Array.isArray(payload) ? payload : [];
                const filteredTickets = selectedRegion
                    ? tickets.filter(ticket => normalizeRegion(getTicketRegion(ticket)) === normalizeRegion(selectedRegion))
                    : tickets;

                trackCriticalOpenTickets(filteredTickets);
                renderTickets(filteredTickets);
            } catch (error) {
                console.error('Failed fetching live emergency queue matrix.', error);
                document.getElementById('queueContainer').innerHTML = `
                    <p class="stat-card" style="background:rgba(255,0,0,0.04);border-color:rgba(255,0,0,0.06);">Live queue is unavailable. Check that the Spring Boot API is running on port 8082.</p>
                `;
            }
        }

        function renderTickets(tickets) {
            const container = document.getElementById('queueContainer');
            const incomingTicketIds = new Set(tickets.map(t => String(t.id)));
            const existingCards = document.querySelectorAll('article[data-ticket-id]');
            const existingTicketIds = new Set(Array.from(existingCards).map(card => card.getAttribute('data-ticket-id')));

            existingTicketIds.forEach(ticketId => {
                if (!incomingTicketIds.has(ticketId)) {
                    const card = container.querySelector(`article[data-ticket-id="${escapeAttr(ticketId)}"]`);
                    if (card) {
                        card.remove();
                        delete ticketTimestamps[ticketId];
                    }
                }
            });

            if (tickets.length === 0) {
                if (existingCards.length === 0) {
                    container.innerHTML = `
                        <p class="stat-card" style="text-align:center;color:var(--muted);">No matching emergency tickets found in the selected region.</p>
                    `;
                }
                return;
            }

            if (existingCards.length === 0 && container.children.length > 0 && container.children[0].tagName !== 'ARTICLE') {
                container.innerHTML = '';
            }

            tickets.forEach(ticket => {
                const id = safeText(ticket.id);
                const ticketIdStr = String(id);
                const priority = safeText(ticket.priority, 'MEDIUM').toUpperCase();
                const category = safeText(ticket.category, 'OTHER').toUpperCase();
                const status = safeText(ticket.status, 'OPEN').toUpperCase();
                const workerName = safeText(ticket.workerName || ticket.claimedBy || ticket.assignedWorker, 'Field responder');
                const region = safeText(getTicketRegion(ticket), 'Global');
                const summary = safeText(ticket.summary, 'Emergency logged.');
                const rawMessage = safeText(ticket.rawMessage, 'No raw SOS message captured.');
                const latitude = safeCoordinate(ticket.latitude);
                const longitude = safeCoordinate(ticket.longitude);
                const createdAt = ticket.timestamp ? new Date(ticket.timestamp).toLocaleString() : 'Pending timestamp';
                const isClaimed = status === 'CLAIMED';
                const priorityTone = getPriorityTone(priority);
                const cardTone = isClaimed
                    ? 'border-yellow-300/60 bg-yellow-500/10'
                    : `${priorityTone.border} bg-slate-900/85`;

                const existingCard = container.querySelector(`article[data-ticket-id="${escapeAttr(ticketIdStr)}"]`);

                if (existingCard) {
                    updateExistingCard(existingCard, {
                        priority,
                        category,
                        status,
                        isClaimed,
                        workerName,
                        region,
                        summary,
                        rawMessage,
                        latitude,
                        longitude,
                        createdAt,
                        priorityTone,
                        cardTone,
                        id:ticketIdStr
                    });
                } else {
                    const ticketStartEpoch = Date.now();
                    ticketTimestamps[ticketIdStr] = ticketStartEpoch;

                    const slaTimerHtml = isClaimed
                        ? `<span class="sla-timer muted" aria-label="SLA timer"><span aria-hidden="true">⏱️</span> Handled</span>`
                        : `<span class="sla-timer" data-ticket-id="${escapeHtml(id)}" data-start="${ticketStartEpoch}" aria-label="SLA timer"><span aria-hidden="true">⏱️</span> Waiting: 0s</span>`;

                    const newCardHtml = `
                        <article class="incident-card rounded-lg border ${cardTone}" data-ticket-id="${escapeHtml(ticketIdStr)}">
                            <div>
                                <div class="meta-row">
                                    <span class="badge priority-pill ${priorityTone.badge}">${priority}</span>
                                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${category}</span>
                                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${region}</span>
                                </div>
                                <div>
                                    <h2>${category} Emergency Resource Request</h2>
                                    <p style="margin-top:8px;"><strong>AI Triage Verdict:</strong> ${summary}</p>
                                    <p style="margin-top:6px;"><strong>Raw SOS Message:</strong> "${rawMessage}"</p>
                                </div>
                                <div style="margin-top:12px">${slaTimerHtml}</div>
                            </div>
                            <div class="actions">
                                ${status === 'OPEN' ? `<button type="button" onclick="claimTicket('${escapeJs(id)}')" class="btn btn-accept">Accept Incident</button>` : ''}
                                <button type="button" onclick="resolveTicket('${escapeJs(id)}')" class="btn btn-resolve">Mark Resolved</button>
                                <a href="https://www.google.com/maps/search/?api=1&query=${latitude},${longitude}" target="_blank" rel="noopener" class="btn btn-map">Map Location</a>
                            </div>
                            <div class="card-footer">
                                <div><span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Coordinates</span>${latitude}, ${longitude}</div>
                                <div><span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Created</span>${safeText(createdAt)}</div>
                                <div class="${isClaimed ? 'font-bold text-yellow-200' : ''}"><span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Status</span>${isClaimed ? `⚠️ Status: CLAIMED by ${workerName}` : `Status: ${status}`}</div>
                            </div>
                        </article>
                    `;
                    container.insertAdjacentHTML('beforeend', newCardHtml);
                }
            });
        }

        function updateExistingCard(card, data) {
            const { priority, category, status, isClaimed, workerName, region, summary, rawMessage, latitude, longitude, createdAt, priorityTone } = data;
            const metaRow = card.querySelector('.meta-row');
            if (metaRow) {
                metaRow.innerHTML = `
                    <span class="badge priority-pill ${priorityTone.badge}">${priority}</span>
                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${category}</span>
                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${region}</span>
                `;
            }

            const title = card.querySelector('h2'); if (title) title.textContent = `${category} Emergency Resource Request`;
            const triage = card.querySelector('p'); if (triage) triage.innerHTML = `<strong>AI Triage Verdict:</strong> ${summary}`;
            const rawP = card.querySelectorAll('p')[1]; if (rawP) rawP.innerHTML = `<strong>Raw SOS Message:</strong> "${rawMessage}"`;

            const footer = card.querySelector('.card-footer');
            if (footer) {
                const parts = footer.querySelectorAll('div');
                if (parts[0]) parts[0].innerHTML = `<span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Coordinates</span>${latitude}, ${longitude}`;
                if (parts[1]) parts[1].innerHTML = `<span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Created</span>${safeText(createdAt)}`;
                if (parts[2]) parts[2].innerHTML = `<span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Status</span>${isClaimed ? `⚠️ Status: CLAIMED by ${workerName}` : `Status: ${status}`}`;
            }

            const actions = card.querySelector('.actions');
            if (actions) {
                actions.innerHTML = `${status === 'OPEN' ? `<button type="button" onclick="claimTicket('${escapeJs(data.id)}')" class="btn btn-accept">Accept Incident</button>` : ''}` +
                    `<button type="button" onclick="resolveTicket('${escapeJs(data.id)}')" class="btn btn-resolve">Mark Resolved</button>` +
                    `<a href="https://www.google.com/maps/search/?api=1&query=${latitude},${longitude}" target="_blank" rel="noopener" class="btn btn-map">Map Location</a>`;
            }
        }

        async function claimTicket(id) {
            const workerName = prompt('Enter responder name to claim this incident:');
            if (!workerName || !workerName.trim()) {
                return;
            }

            try {
                const response = await fetch(`/api/tickets/${encodeURIComponent(id)}/claim?workerName=${encodeURIComponent(workerName.trim())}`, { method: 'POST' });
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                await fetchLiveQueue();
                await updateAnalyticsCounters();
            } catch (error) {
                console.error('Could not claim ticket.', error);
                alert('Could not claim this incident.');
            }
        }

        async function resolveTicket(id) {
            try {
                const response = await fetch(`${API_BASE}/api/tickets/${encodeURIComponent(id)}/resolve`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                await fetchLiveQueue();
                await updateAnalyticsCounters();
            } catch (error) {
                console.error('Could not process ticket resolution.', error);
                alert('Could not process ticket resolution.');
            }
        }

        async function updateAnalyticsCounters() {
            try {
                const response = await fetch(`/api/tickets/stats`);
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                const stats = await response.json();
                document.getElementById('statCritical').innerText = safeNumber(stats.critical);
                document.getElementById('statTotal').innerText = safeNumber(stats.totalActive);
                document.getElementById('statMedical').innerText = safeNumber(stats.medical);
            } catch (error) {
                console.error('Analytics fetch offline.', error);
            }
        }

        function trackCriticalOpenTickets(tickets) {
            tickets.forEach(ticket => {
                if (!ticket || ticket.id === undefined || ticket.id === null) return;
                const id = String(ticket.id);
                const priority = safeText(ticket.priority).toUpperCase();
                const status = safeText(ticket.status, 'OPEN').toUpperCase();
                if (!knownOpenCriticalTicketIds.has(id) && priority === 'CRITICAL' && status === 'OPEN') playCriticalAlarm();
                if (priority === 'CRITICAL' && status === 'OPEN') knownOpenCriticalTicketIds.add(id);
            });
        }

        function getAlarmAudioContext() { const AudioContextClass = window.AudioContext || window.webkitAudioContext; if (!AudioContextClass) return null; if (!alarmAudioContext) alarmAudioContext = new AudioContextClass(); return alarmAudioContext; }

        function playCriticalAlarm() { const hasUserActivated = !navigator.userActivation || navigator.userActivation.hasBeenActive; if (!hasUserActivated) return; const audioContext = getAlarmAudioContext(); if (!audioContext) return; const scheduleAlarm = () => { const now = audioContext.currentTime; const masterGain = audioContext.createGain(); masterGain.gain.setValueAtTime(0.0001, now); masterGain.gain.exponentialRampToValueAtTime(0.2, now + 0.02); masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34); masterGain.connect(audioContext.destination); const highTone = audioContext.createOscillator(); highTone.type = 'sine'; highTone.frequency.setValueAtTime(920, now); highTone.frequency.exponentialRampToValueAtTime(460, now + 0.2); highTone.connect(masterGain); highTone.start(now); highTone.stop(now + 0.34); const lowTone = audioContext.createOscillator(); lowTone.type = 'triangle'; lowTone.frequency.setValueAtTime(680, now + 0.08); lowTone.frequency.exponentialRampToValueAtTime(340, now + 0.32); lowTone.connect(masterGain); lowTone.start(now + 0.08); lowTone.stop(now + 0.34); highTone.onended = () => masterGain.disconnect(); }; if (audioContext.state === 'suspended') { audioContext.resume().then(scheduleAlarm).catch(()=>{}); return;} scheduleAlarm(); }

        function getTicketRegion(ticket){ return ticket && (ticket.region || ticket.assignedRegion || ticket.ticketRegion || ticket.zone || ticket.locationRegion); }
        function normalizeRegion(value){return String(value||'').trim().toLowerCase();}

        function getPriorityTone(priority) {
            switch (priority){
                case 'CRITICAL': return { border: 'border-red-400/50', badge: 'bg-red-400 text-red-950' };
                case 'LOW': return { border: 'border-emerald-400/35', badge: 'bg-emerald-300 text-emerald-950' };
                default: return { border: 'border-cyan-400/35', badge: 'bg-cyan-300 text-cyan-950' };
            }
        }

        function safeText(value, fallback=''){ if (value===undefined||value===null) return fallback; const text=String(value).trim(); return text===''?fallback:escapeHtml(text); }
        function safeNumber(value){ const number=Number(value); return Number.isFinite(number)?number:0; }
        function safeCoordinate(value){ const number=Number(value); return Number.isFinite(number)?number.toFixed(6):'0.000000'; }
        function escapeHtml(value){ return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function escapeJs(value){ return String(value).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
        function escapeAttr(value){ return String(value).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function formatSlaElapsed(totalSeconds){ totalSeconds = Math.max(0, Math.floor(totalSeconds)); if (totalSeconds < 60) return `Waiting: ${totalSeconds}s`; const m = Math.floor(totalSeconds/60); const s = totalSeconds % 60; return `Waiting: ${m}m ${s}s`; }

        function updateSlaTimers(){
            const nowMs = Date.now();
            const timers = document.querySelectorAll('.sla-timer[data-start]');
            timers.forEach(timerEl => {
                const startAttr = timerEl.getAttribute('data-start');
                const ticketId = timerEl.getAttribute('data-ticket-id') || '';
                const startMs = Number(startAttr);
                if (!Number.isFinite(startMs)) return;
                if (ticketId){ if (ticketTimestamps[ticketId] === undefined){ ticketTimestamps[ticketId] = startMs; } }
                const effectiveStartMs = (ticketId && Number.isFinite(ticketTimestamps[ticketId])) ? ticketTimestamps[ticketId] : startMs;
                const elapsedSeconds = (nowMs - effectiveStartMs) / 1000;
                const formatted = formatSlaElapsed(elapsedSeconds);
                timerEl.innerHTML = `<span aria-hidden="true">⏱️</span> ${formatted}`;
                if (elapsedSeconds >= 180){ if (!timerEl.classList.contains('muted')){ timerEl.classList.add('sla-breach'); } } else { timerEl.classList.remove('sla-breach'); }
            });
        }

        setInterval(updateSlaTimers,1000);

        updateAnalyticsCounters();
        fetchLiveQueue();
        setInterval(updateAnalyticsCounters,3000);
        setInterval(fetchLiveQueue,3000);
    </script>
</body>
</html>
