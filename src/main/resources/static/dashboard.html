<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGE-RESCUE Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    }
                }
            }
        };
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="min-h-screen bg-[radial-gradient(circle_at_top,rgba(14,165,233,0.14),transparent_38%)]">
        <section class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
            <header class="mb-6 flex flex-col gap-4 border-b border-slate-800 pb-6 lg:flex-row lg:items-end lg:justify-between">
                <div>
                    <a href="index.html" class="mb-4 inline-flex text-sm font-semibold text-cyan-300 hover:text-cyan-200">← Gateway</a>
                    <h1 class="text-3xl font-black tracking-tight text-white sm:text-5xl">Field Responder Command Center</h1>
                    <p class="mt-3 max-w-3xl text-sm leading-6 text-slate-300 sm:text-base">
                        Live multi-region triage queue with claim handling and critical alert monitoring.
                    </p>
                </div>
                <div class="flex items-center gap-3 rounded-lg border border-emerald-400/30 bg-emerald-400/10 px-4 py-3 text-sm font-bold text-emerald-200">
                    <span class="h-2.5 w-2.5 rounded-full bg-emerald-300 shadow-[0_0_16px_rgba(110,231,183,0.9)]"></span>
                    Autorefresh Active
                </div>
            </header>

            <section class="mb-5 grid gap-3 sm:grid-cols-3">
                <div class="rounded-lg border border-red-400/30 bg-red-500/15 p-4">
                    <p class="text-xs font-bold uppercase tracking-[0.2em] text-red-200">Critical Threats</p>
                    <p id="statCritical" class="mt-2 text-3xl font-black text-white">0</p>
                </div>
                <div class="rounded-lg border border-cyan-400/30 bg-cyan-500/15 p-4">
                    <p class="text-xs font-bold uppercase tracking-[0.2em] text-cyan-200">Active Records</p>
                    <p id="statTotal" class="mt-2 text-3xl font-black text-white">0</p>
                </div>
                <div class="rounded-lg border border-violet-400/30 bg-violet-500/15 p-4">
                    <p class="text-xs font-bold uppercase tracking-[0.2em] text-violet-200">Medical Cases</p>
                    <p id="statMedical" class="mt-2 text-3xl font-black text-white">0</p>
                </div>
            </section>

            <section class="mb-6 grid gap-3 rounded-lg border border-slate-800 bg-slate-900/80 p-4 shadow-2xl shadow-slate-950/30 lg:grid-cols-[1fr_180px_180px_180px]">
                <label class="block">
                    <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-400">Search</span>
                    <input
                        id="searchBar"
                        type="text"
                        placeholder="Search keywords..."
                        oninput="fetchLiveQueue()"
                        class="h-11 w-full rounded-md border border-slate-700 bg-slate-950 px-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300/20"
                    >
                </label>
                <label class="block">
                    <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-400">Filter Region</span>
                    <select
                        id="regionFilter"
                        onchange="fetchLiveQueue()"
                        class="h-11 w-full rounded-md border border-slate-700 bg-slate-950 px-3 text-sm font-semibold text-white outline-none transition focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300/20"
                    >
                        <option value="">All Regions</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Global">Global</option>
                    </select>
                </label>
                <label class="block">
                    <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-400">Priority</span>
                    <select
                        id="priorityFilter"
                        onchange="fetchLiveQueue()"
                        class="h-11 w-full rounded-md border border-slate-700 bg-slate-950 px-3 text-sm font-semibold text-white outline-none transition focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300/20"
                    >
                        <option value="">All Priorities</option>
                        <option value="CRITICAL">Critical</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                </label>
                <label class="block">
                    <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-400">Category</span>
                    <select
                        id="categoryFilter"
                        onchange="fetchLiveQueue()"
                        class="h-11 w-full rounded-md border border-slate-700 bg-slate-950 px-3 text-sm font-semibold text-white outline-none transition focus:border-cyan-300 focus:ring-2 focus:ring-cyan-300/20"
                    >
                        <option value="">All Categories</option>
                        <option value="MEDICAL">Medical</option>
                        <option value="FLOOD">Flood</option>
                        <option value="RESCUE">Rescue</option>
                        <option value="BLOCKAGE">Blockage</option>
                        <option value="OTHER">Other</option>
                    </select>
                </label>
            </section>

            <section id="queueContainer" class="grid gap-4">
                <p class="rounded-lg border border-slate-800 bg-slate-900/70 p-6 text-center text-slate-400">Waiting for real-time distress signals...</p>
            </section>
        </section>
    </main>

    <script>
        const API_BASE = 'http://localhost:8082';
        const knownOpenCriticalTicketIds = new Set();
        let alarmAudioContext = null;

        async function fetchLiveQueue() {
            const search = document.getElementById('searchBar').value.trim();
            const priority = document.getElementById('priorityFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const selectedRegion = document.getElementById('regionFilter').value;
            const params = new URLSearchParams();

            if (search) params.set('search', search);
            if (priority) params.set('priority', priority);
            if (category) params.set('category', category);

            try {
                const response = await fetch(`${API_BASE}/api/tickets/live?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const payload = await response.json();
                const tickets = Array.isArray(payload) ? payload : [];
                const filteredTickets = selectedRegion
                    ? tickets.filter(ticket => normalizeRegion(getTicketRegion(ticket)) === normalizeRegion(selectedRegion))
                    : tickets;

                trackCriticalOpenTickets(filteredTickets);
                renderTickets(filteredTickets);
            } catch (error) {
                console.error('Failed fetching live emergency queue matrix.', error);
                document.getElementById('queueContainer').innerHTML = `
                    <p class="rounded-lg border border-red-400/30 bg-red-500/10 p-6 text-center text-red-100">
                        Live queue is unavailable. Check that the Spring Boot API is running on port 8082.
                    </p>
                `;
            }
        }

        function renderTickets(tickets) {
            const container = document.getElementById('queueContainer');

            if (!tickets.length) {
                container.innerHTML = `
                    <p class="rounded-lg border border-slate-800 bg-slate-900/70 p-6 text-center text-slate-400">
                        No matching emergency tickets found in the selected region.
                    </p>
                `;
                return;
            }

            container.innerHTML = tickets.map(ticket => {
                const id = safeText(ticket.id);
                const priority = safeText(ticket.priority, 'MEDIUM').toUpperCase();
                const category = safeText(ticket.category, 'OTHER').toUpperCase();
                const status = safeText(ticket.status, 'OPEN').toUpperCase();
                const workerName = safeText(ticket.workerName || ticket.claimedBy || ticket.assignedWorker, 'Field responder');
                const region = safeText(getTicketRegion(ticket), 'Global');
                const summary = safeText(ticket.summary, 'Emergency logged.');
                const rawMessage = safeText(ticket.rawMessage, 'No raw SOS message captured.');
                const latitude = safeCoordinate(ticket.latitude);
                const longitude = safeCoordinate(ticket.longitude);
                const createdAt = ticket.timestamp ? new Date(ticket.timestamp).toLocaleString() : 'Pending timestamp';
                const isClaimed = status === 'CLAIMED';
                const priorityTone = getPriorityTone(priority);
                const cardTone = isClaimed
                    ? 'border-yellow-300/60 bg-yellow-500/10'
                    : `${priorityTone.border} bg-slate-900/85`;

                return `
                    <article class="rounded-lg border ${cardTone} p-5 shadow-xl shadow-slate-950/25">
                        <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                            <div class="min-w-0">
                                <div class="mb-3 flex flex-wrap items-center gap-2">
                                    <span class="rounded-full ${priorityTone.badge} px-3 py-1 text-xs font-black tracking-[0.16em]">${priority}</span>
                                    <span class="rounded-full border border-slate-700 bg-slate-950 px-3 py-1 text-xs font-bold text-slate-300">${category}</span>
                                    <span class="rounded-full border border-cyan-400/30 bg-cyan-400/10 px-3 py-1 text-xs font-bold text-cyan-200">${region}</span>
                                </div>
                                <h2 class="text-xl font-black text-white">${category} Emergency Resource Request</h2>
                                <p class="mt-3 text-sm leading-6 text-slate-200"><strong class="text-white">AI Triage Verdict:</strong> ${summary}</p>
                                <p class="mt-2 text-sm leading-6 text-slate-400"><strong class="text-slate-200">Raw SOS Message:</strong> "${rawMessage}"</p>
                            </div>
                            <div class="flex shrink-0 flex-col gap-2 sm:flex-row lg:flex-col">
                                ${status === 'OPEN' ? `
                                    <button
                                        type="button"
                                        onclick="claimTicket('${escapeJs(id)}')"
                                        class="h-11 rounded-md bg-emerald-400 px-4 text-sm font-black text-slate-950 transition hover:bg-emerald-300 focus:outline-none focus:ring-2 focus:ring-emerald-200"
                                    >
                                        Accept Incident
                                    </button>
                                ` : ''}
                                <button
                                    type="button"
                                    onclick="resolveTicket('${escapeJs(id)}')"
                                    class="h-11 rounded-md border border-slate-700 px-4 text-sm font-bold text-slate-200 transition hover:border-slate-500 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400"
                                >
                                    Mark Resolved
                                </button>
                            </div>
                        </div>

                        <div class="mt-5 grid gap-3 border-t border-slate-800 pt-4 text-sm sm:grid-cols-3">
                            <p class="text-slate-400"><span class="block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Coordinates</span>${latitude}, ${longitude}</p>
                            <p class="text-slate-400"><span class="block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Created</span>${safeText(createdAt)}</p>
                            <p class="${isClaimed ? 'font-bold text-yellow-200' : 'text-emerald-200'}">
                                <span class="block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Status</span>
                                ${isClaimed ? `⚠️ Status: CLAIMED by ${workerName}` : `Status: ${status}`}
                            </p>
                        </div>
                    </article>
                `;
            }).join('');
        }

        async function claimTicket(id) {
            const workerName = prompt('Enter responder name to claim this incident:');
            if (!workerName || !workerName.trim()) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/tickets/${encodeURIComponent(id)}/claim?workerName=${encodeURIComponent(workerName.trim())}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                await fetchLiveQueue();
                await updateAnalyticsCounters();
            } catch (error) {
                console.error('Could not claim ticket.', error);
                alert('Could not claim this incident.');
            }
        }

        async function resolveTicket(id) {
            try {
                const response = await fetch(`${API_BASE}/api/tickets/${encodeURIComponent(id)}/resolve`, { method: 'DELETE' });
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                await fetchLiveQueue();
                await updateAnalyticsCounters();
            } catch (error) {
                console.error('Could not process ticket resolution.', error);
                alert('Could not process ticket resolution.');
            }
        }

        async function updateAnalyticsCounters() {
            try {
                const response = await fetch(`${API_BASE}/api/tickets/stats`);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const stats = await response.json();
                document.getElementById('statCritical').innerText = safeNumber(stats.critical);
                document.getElementById('statTotal').innerText = safeNumber(stats.totalActive);
                document.getElementById('statMedical').innerText = safeNumber(stats.medical);
            } catch (error) {
                console.error('Analytics fetch offline.', error);
            }
        }

        function trackCriticalOpenTickets(tickets) {
            tickets.forEach(ticket => {
                if (!ticket || ticket.id === undefined || ticket.id === null) {
                    return;
                }

                const id = String(ticket.id);
                const priority = safeText(ticket.priority).toUpperCase();
                const status = safeText(ticket.status, 'OPEN').toUpperCase();

                if (!knownOpenCriticalTicketIds.has(id) && priority === 'CRITICAL' && status === 'OPEN') {
                    playCriticalAlarm();
                }

                if (priority === 'CRITICAL' && status === 'OPEN') {
                    knownOpenCriticalTicketIds.add(id);
                }
            });
        }

        function getAlarmAudioContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                return null;
            }

            if (!alarmAudioContext) {
                alarmAudioContext = new AudioContextClass();
            }

            return alarmAudioContext;
        }

        function playCriticalAlarm() {
            const hasUserActivated = !navigator.userActivation || navigator.userActivation.hasBeenActive;
            if (!hasUserActivated) {
                return;
            }

            const audioContext = getAlarmAudioContext();
            if (!audioContext) {
                return;
            }

            const scheduleAlarm = () => {
                const now = audioContext.currentTime;
                const masterGain = audioContext.createGain();
                masterGain.gain.setValueAtTime(0.0001, now);
                masterGain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
                masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
                masterGain.connect(audioContext.destination);

                const highTone = audioContext.createOscillator();
                highTone.type = 'sine';
                highTone.frequency.setValueAtTime(920, now);
                highTone.frequency.exponentialRampToValueAtTime(460, now + 0.2);
                highTone.connect(masterGain);
                highTone.start(now);
                highTone.stop(now + 0.34);

                const lowTone = audioContext.createOscillator();
                lowTone.type = 'triangle';
                lowTone.frequency.setValueAtTime(680, now + 0.08);
                lowTone.frequency.exponentialRampToValueAtTime(340, now + 0.32);
                lowTone.connect(masterGain);
                lowTone.start(now + 0.08);
                lowTone.stop(now + 0.34);

                highTone.onended = () => masterGain.disconnect();
            };

            if (audioContext.state === 'suspended') {
                audioContext.resume().then(scheduleAlarm).catch(() => {});
                return;
            }

            scheduleAlarm();
        }

        function getTicketRegion(ticket) {
            return ticket && (ticket.region || ticket.assignedRegion || ticket.ticketRegion || ticket.zone || ticket.locationRegion);
        }

        function normalizeRegion(value) {
            return String(value || '').trim().toLowerCase();
        }

        function getPriorityTone(priority) {
            switch (priority) {
                case 'CRITICAL':
                    return { border: 'border-red-400/50', badge: 'bg-red-400 text-red-950' };
                case 'LOW':
                    return { border: 'border-emerald-400/35', badge: 'bg-emerald-300 text-emerald-950' };
                default:
                    return { border: 'border-cyan-400/35', badge: 'bg-cyan-300 text-cyan-950' };
            }
        }

        function safeText(value, fallback = '') {
            if (value === undefined || value === null) {
                return fallback;
            }

            const text = String(value).trim();
            return text === '' ? fallback : escapeHtml(text);
        }

        function safeNumber(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number : 0;
        }

        function safeCoordinate(value) {
            const number = Number(value);
            return Number.isFinite(number) ? number.toFixed(6) : '0.000000';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeJs(value) {
            return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        updateAnalyticsCounters();
        fetchLiveQueue();
        setInterval(updateAnalyticsCounters, 3000);
        setInterval(fetchLiveQueue, 3000);
    </script>
</body>
</html>
