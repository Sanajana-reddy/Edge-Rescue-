<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Field Responder Command Center</title>
    <style>
        :root {
            --canvas: #0b0f19;
            --panel: #111827;
            --panel-ink: #0f1724;
            --muted: #94a3b8;
            --border: #334155;
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --white: #ffffff;
        }

        *,*::before,*::after { box-sizing: border-box; }
        html, body { min-height: 100%; margin: 0; background: var(--canvas); font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, 'Helvetica Neue', Arial, sans-serif; color: var(--white); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        .container { max-width: 1200px; margin: 28px auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; }
        .header-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.01em; }
        .subtitle { color: var(--muted); font-size: 0.94rem; }
        .tactical-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent); border: 1px solid rgba(255,255,255,0.08); font-weight: 700; color: var(--accent-emerald); box-shadow: 0 6px 20px rgba(2,6,23,0.5); }

        .export-manifest-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            border: 2px solid var(--accent-emerald);
            background-color: rgba(16, 185, 129, 0.08);
            color: var(--white);
            font-weight: 800;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.14s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.12);
            letter-spacing: 0.02em;
        }
        .export-manifest-btn:hover {
            background-color: rgba(16, 185, 129, 0.16);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.22);
            transform: translateY(-2px);
        }
        .export-manifest-btn:active {
            transform: translateY(0px);
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.15);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); padding: 16px; border-radius: 12px; box-shadow: 0 10px 30px rgba(2,6,23,0.35); }
        .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 800; }
        .stat-value { font-size: 1.8rem; font-weight: 900; margin-top: 8px; color: var(--white); }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .control { display: flex; flex-direction: column; gap: 6px; }
        .control label { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
        input[type="text"], select { background: #1f2937; border: 1px solid rgba(255,255,255,0.08); padding: 10px 12px; border-radius: 8px; color: var(--white); font-weight: 600; }
        input[type="text"]::placeholder { color: #94a3b8; }
        input[type="text"]:focus, select:focus { outline: none; box-shadow: 0 0 0 4px rgba(34,211,238,0.08); border-color: var(--accent-cyan); }

        #queueContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; width: 100%; }

        .incident-card { display: flex; flex-direction: column; justify-content: space-between; background: #1e293b; border: 1px solid var(--border); border-top: 6px solid var(--border); border-radius: 0.75rem; padding: 1.5rem; min-height: 340px; box-shadow: 0 16px 40px rgba(0,0,0,0.25); word-break: break-word; line-height: 1.5; overflow: hidden; }
        .incident-card.critical { border-top: 6px solid #ef4444; background: linear-gradient(to bottom, rgba(239, 68, 68, 0.08), #1e293b); box-shadow: 0 18px 44px rgba(239,68,68,0.14), 0 16px 40px rgba(0,0,0,0.25); }
        .incident-card.medium { border-top: 6px solid #f59e0b; background: linear-gradient(to bottom, rgba(245, 158, 11, 0.05), #1e293b); box-shadow: 0 18px 44px rgba(245,158,11,0.1), 0 16px 40px rgba(0,0,0,0.25); }
        .incident-card.low { border-top: 6px solid #10b981; background: linear-gradient(to bottom, rgba(16, 185, 129, 0.03), #1e293b); box-shadow: 0 18px 44px rgba(16,185,129,0.08), 0 16px 40px rgba(0,0,0,0.25); }
        .incident-card .meta-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
        .incident-card h2 { margin: 0; font-size: 1.05rem; line-height: 1.35; }
        .incident-card p { margin: 0; color: var(--muted); }
        .incident-card p strong { color: var(--white); }
        .incident-card .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: flex-end; margin-top: 18px; }
        .incident-card .actions .btn { min-width: 140px; display: inline-flex; align-items: center; justify-content: center; }
        .incident-card .card-footer { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; margin-top: 18px; font-size: 0.9rem; color: var(--muted); }
        .incident-card .card-footer div { word-break: break-word; }

        .allocation-panel { margin-top: 14px; background: rgba(15,23,42,0.95); border: 1px dashed #334155; border-radius: 14px; padding: 0.75rem; font-size: 0.8rem; color: #cbd5e1; display: grid; gap: 0.55rem; }
        .allocation-panel div { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .allocation-panel .allocation-text { display: flex; flex-direction: column; gap: 4px; }
        .allocation-panel .allocation-text span:first-child { color: #f8fafc; font-weight: 700; font-size: 0.92rem; }
        .allocation-panel .recommendation-badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; background: rgba(34,211,238,0.12); color: #cffafe; padding: 8px 12px; border: 1px solid rgba(34,211,238,0.22); font-size: 0.78rem; font-weight: 700; }

        .mesh-relay-panel { margin-top: 12px; background: #0b0f19; border: 1px solid #1f2937; border-radius: 12px; padding: 0.6rem; font-size: 0.75rem; color: #cbd5e1; display: flex; flex-direction: column; gap: 8px; }
        .mesh-chain { display: flex; align-items: center; gap: 10px; overflow-x: auto; }
        .mesh-node-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.02); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace; color: #94a3b8; font-size: 0.72rem; white-space: nowrap; }
        .mesh-node-badge .indicator { width: 10px; height: 10px; border-radius: 999px; box-shadow: 0 6px 16px rgba(2,6,23,0.6); }
        .mesh-connector { font-weight: 800; color: #94a3b8; }
        .mesh-metrics { display:flex; gap:8px; align-items:center; justify-content:space-between; color:#94a3b8; font-size:0.72rem; }

        .badge { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; font-weight: 800; font-size: 0.72rem; letter-spacing: 0.02em; }
        .badge.critical { background-color: #ef4444; color: #ffffff; font-weight: 800; border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 0 18px rgba(239,68,68,0.24); }
        .badge.medium { background-color: #f59e0b; color: #000000; font-weight: 800; border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 0 18px rgba(245,158,11,0.18); }
        .badge.low { background-color: #10b981; color: #ffffff; font-weight: 800; border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 0 18px rgba(16,185,129,0.18); }
        .priority-pill { font-weight: 900; }

        .btn { padding: 10px 14px; border-radius: 10px; border: 0; font-weight: 800; cursor: pointer; transition: transform .14s ease, box-shadow .14s ease; text-decoration: none; text-align: center; }
        .btn-accept { background: var(--accent-emerald); color: #052e16; }
        .btn-accept:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(16,185,129,0.14); }
        .btn-resolve { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--white); }
        .btn-resolve:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(2,6,23,0.25); }
        .btn-map { background: rgba(14,165,233,0.08); border: 1px solid rgba(34,211,238,0.28); color: #7dd3fc; }
        .incident-card .actions .btn-map { min-width: 118px; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; letter-spacing: 0.02em; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02); }
        .btn-map:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(34,211,238,0.14); }

        .sla-timer { display: inline-flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(148,163,184,0.24); background: #0f172a; font-weight: 800; color: #e2e8f0; }
        .sla-timer.muted { opacity: 0.85; color: #cbd5e1; }
        @keyframes sla-breach-flash {
            0%, 100% { background-color: #0f172a; border-color: rgba(148,163,184,0.35); color: #ffffff; box-shadow: none; }
            50% { background-color: #ef4444; border-color: #ef4444; color: #ffffff; box-shadow: 0 0 0 2px rgba(239,68,68,0.35), 0 0 28px rgba(239,68,68,0.65); }
        }
        .sla-timer.sla-breach { animation: sla-breach-flash 1s steps(1, end) infinite; color: #ffffff; font-weight: 900; }

        .muted { color: var(--muted); }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

        @media (max-width: 640px) {
            .container { padding: 14px; }
            .title { font-size: 1.25rem; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-right { width: 100%; justify-content: flex-start; }
            .incident-card .card-footer { grid-template-columns: 1fr; }
            .allocation-panel { font-size: 0.75rem; }
            .export-manifest-btn { font-size: 0.75rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <div>
                    <div class="title">Field Responder Command Center</div>
                    <div class="subtitle">Live multi-region triage queue with claim handling and critical alert monitoring.</div>
                </div>
                <div class="tactical-badge">● Tactical • Live</div>
            </div>
            <div class="header-right">
                <button type="button" onclick="exportTacticalManifest()" class="export-manifest-btn" title="Export all active incidents to CSV">
                    <span>📥</span>
                    <span>Export Tactical Manifest</span>
                </button>
                <div class="tactical-badge" style="background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--accent-cyan);">Autorefresh Active</div>
            </div>
        </header>

        <section class="stats-grid" aria-hidden="false">
            <div class="stat-card">
                <div class="stat-label">Critical Threats</div>
                <div id="statCritical" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Active Records</div>
                <div id="statTotal" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Medical Cases</div>
                <div id="statMedical" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⚠️ SLA Breach Counter</div>
                <div id="statSlaBreach" class="stat-value">0</div>
            </div>
        </section>

        <section class="controls">
            <div class="control">
                <label for="searchBar">Search</label>
                <input id="searchBar" type="text" placeholder="Search keywords..." oninput="fetchLiveQueue()" />
            </div>
            <div class="control">
                <label for="regionFilter">Filter Region</label>
                <select id="regionFilter" onchange="fetchLiveQueue()">
                    <option value="">All Regions</option>
                    <option value="Bangalore">Bangalore</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Global">Global</option>
                </select>
            </div>
            <div class="control">
                <label for="priorityFilter">Priority</label>
                <select id="priorityFilter" onchange="fetchLiveQueue()">
                    <option value="">All Priorities</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                </select>
            </div>
            <div class="control">
                <label for="categoryFilter">Category</label>
                <select id="categoryFilter" onchange="fetchLiveQueue()">
                    <option value="">All Categories</option>
                    <option value="MEDICAL">Medical</option>
                    <option value="FLOOD">Flood</option>
                    <option value="RESCUE">Rescue</option>
                    <option value="BLOCKAGE">Blockage</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
        </section>

        <main>
            <section id="queueContainer">
                <p class="stat-card" style="text-align:center;color:var(--muted);">Waiting for real-time distress signals...</p>
            </section>
        </main>
    </div>

    <script>
        const RESCUE_DEPOTS = [
            { name: "Bangalore North Command Depot", lat: 13.0350, lon: 77.5900, region: "bangalore" },
            { name: "Central Maritime & Flood Outpost", lat: 10.0100, lon: 76.3300, region: "kerala" },
            { name: "Regional Emergency Logistics Hub", lat: 12.9500, lon: 77.5000, region: "global" }
        ];

        const API_BASE = 'http://localhost:8082';
        const knownOpenCriticalTicketIds = new Set();
        let alarmAudioContext = null;
        const ticketTimestamps = {};
        let lastFetchedTickets = [];

        function getNearestDepot(ticketLat, ticketLon, region) {
            const normalizedRegion = String(region || 'global').trim().toLowerCase();
            const depot = RESCUE_DEPOTS.find(d => d.region === normalizedRegion) || RESCUE_DEPOTS.find(d => d.region === 'global');
            const distance = calculateDistance(ticketLat, ticketLon, depot.lat, depot.lon);
            return { depotName: depot.name, distanceKm: distance };
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const toRad = x => x * Math.PI / 180;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const r = 6371;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return Math.round((r * c) * 10) / 10;
        }

        function getAssetRecommendation(category) {
            switch (String(category || 'OTHER').trim().toUpperCase()) {
                case 'FLOOD': return '💡 Recommended Asset: Inflatable Rescue Boat + Life Jackets';
                case 'MEDICAL': return '💡 Recommended Asset: Advanced Field Ambulance + Trauma Kit';
                case 'RESCUE':
                case 'BLOCKAGE':
                    return '💡 Recommended Asset: Tactical Extraction Truck + Hydraulic Chainsaw';
                default:
                    return '💡 Recommended Asset: Rapid Response Support Package';
            }
        }

        /**
         * Premium CSV Export Function - Tactical Manifest Compiler
         * Scrapes active incident data and triggers client-side download
         */
        function exportTacticalManifest() {
            try {
                // Scrape ticket data from all rendered incident cards
                const incidentCards = document.querySelectorAll('article[data-ticket-id]');
                
                if (incidentCards.length === 0) {
                    alert('No incidents available for export. Load incidents first.');
                    return;
                }

                // Compile CSV Header Row
                const csvHeader = 'Incident ID,Priority,Region,Category,Summary,Latitude,Longitude,Status,Assigned Unit';
                const csvRows = [csvHeader];

                // Iterate through each incident card and extract data
                incidentCards.forEach(card => {
                    const incidentId = card.getAttribute('data-ticket-id') || 'N/A';
                    
                    // Extract metadata badges
                    const metaRow = card.querySelector('.meta-row');
                    let priority = 'N/A', category = 'N/A', region = 'N/A';
                    if (metaRow) {
                        const badges = metaRow.querySelectorAll('.badge');
                        if (badges[0]) priority = badges[0].textContent.trim() || 'N/A';
                        if (badges[1]) category = badges[1].textContent.trim() || 'N/A';
                        if (badges[2]) region = badges[2].textContent.trim() || 'N/A';
                    }

                    // Extract summary (AI Triage Verdict)
                    const triageElement = card.querySelector('p');
                    let summary = 'N/A';
                    if (triageElement) {
                        const text = triageElement.textContent;
                        const match = text.match(/AI Triage Verdict:\s*(.+?)(?:\n|$)/);
                        summary = match ? match[1].trim() : text.trim();
                    }

                    // Extract coordinates from card footer
                    const cardFooter = card.querySelector('.card-footer');
                    let latitude = '0', longitude = '0';
                    if (cardFooter) {
                        const firstDiv = cardFooter.querySelector('div');
                        if (firstDiv) {
                            const coordText = firstDiv.textContent.replace('Coordinates', '').trim();
                            const coordParts = coordText.split(',').map(s => s.trim());
                            if (coordParts.length >= 2) {
                                latitude = coordParts[0] || '0';
                                longitude = coordParts[1] || '0';
                            }
                        }
                    }

                    // Extract status and assigned unit
                    let status = 'OPEN', assignedUnit = 'Unassigned';
                    if (cardFooter) {
                        const footerDivs = cardFooter.querySelectorAll('div');
                        if (footerDivs[2]) {
                            const statusText = footerDivs[2].textContent;
                            if (statusText.includes('CLAIMED')) {
                                status = 'CLAIMED';
                                const match = statusText.match(/CLAIMED by (.+?)(?:\s|$)/);
                                assignedUnit = match ? match[1].trim() : 'Claimed - Pending Assignment';
                            } else {
                                status = statusText.replace('Status:', '').trim() || 'OPEN';
                            }
                        }
                    }

                    // Safely escape CSV field: handle commas, quotes, and newlines
                    const escapeCSVField = (field) => {
                        const str = String(field || '').trim();
                        if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                            return '"' + str.replace(/"/g, '""') + '"';
                        }
                        return str;
                    };

                    // Build CSV row with proper escaping
                    const csvRow = [
                        escapeCSVField(incidentId),
                        escapeCSVField(priority),
                        escapeCSVField(region),
                        escapeCSVField(category),
                        escapeCSVField(summary),
                        escapeCSVField(latitude),
                        escapeCSVField(longitude),
                        escapeCSVField(status),
                        escapeCSVField(assignedUnit)
                    ].join(',');

                    csvRows.push(csvRow);
                });

                // Compile final CSV string
                const csvContent = csvRows.join('\n');

                // Create Blob object with CSV MIME type
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });

                // Generate tactical timestamp-based filename
                const timestamp = new Date().getTime();
                const manifestFileName = `EDGE_RESCUE_MANIFEST_${timestamp}.csv`;

                // Create temporary anchor element for download
                const tempLink = document.createElement('a');
                const objectUrl = URL.createObjectURL(blob);
                
                tempLink.setAttribute('href', objectUrl);
                tempLink.setAttribute('download', manifestFileName);
                tempLink.style.display = 'none';

                // Trigger browser download
                document.body.appendChild(tempLink);
                tempLink.click();

                // Cleanup: revoke object URL and remove temporary anchor
                URL.revokeObjectURL(objectUrl);
                document.body.removeChild(tempLink);

                // Confirmation feedback
                console.log(`✓ Tactical Manifest exported: ${manifestFileName} (${incidentCards.length} incidents)`);

            } catch (error) {
                console.error('Tactical Manifest export failed:', error);
                alert('Export failed. Please check the console for details.');
            }
        }

        async function fetchLiveQueue() {
            const search = document.getElementById('searchBar').value.trim();
            const priority = document.getElementById('priorityFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const selectedRegion = document.getElementById('regionFilter').value;
            const params = new URLSearchParams();

            if (search) params.set('search', search);
            if (priority) params.set('priority', priority);
            if (category) params.set('category', category);

            try {
                const response = await fetch(`/api/tickets/live?${params.toString()}`);
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const payload = await response.json();
                const tickets = Array.isArray(payload) ? payload : [];
                const filteredTickets = selectedRegion
                    ? tickets.filter(ticket => normalizeRegion(getTicketRegion(ticket)) === normalizeRegion(selectedRegion))
                    : tickets;

                lastFetchedTickets = filteredTickets;
                trackCriticalOpenTickets(filteredTickets);
                renderTickets(filteredTickets);
            } catch (error) {
                console.error('Failed fetching live emergency queue matrix.', error);
                document.getElementById('queueContainer').innerHTML = `
                    <p class="stat-card" style="background:rgba(255,0,0,0.04);border-color:rgba(255,0,0,0.06);">Live queue is unavailable. Check that the Spring Boot API is running on port 8082.</p>
                `;
            }
        }

        function renderTickets(tickets) {
            const container = document.getElementById('queueContainer');
            const incomingTicketIds = new Set(tickets.map(t => String(t.id)));
            const existingCards = document.querySelectorAll('article[data-ticket-id]');
            const existingTicketIds = new Set(Array.from(existingCards).map(card => card.getAttribute('data-ticket-id')));

            existingTicketIds.forEach(ticketId => {
                if (!incomingTicketIds.has(ticketId)) {
                    const card = container.querySelector(`article[data-ticket-id="${escapeAttr(ticketId)}"]`);
                    if (card) {
                        card.remove();
                        delete ticketTimestamps[ticketId];
                    }
                }
            });

            if (tickets.length === 0) {
                if (existingCards.length === 0) {
                    container.innerHTML = `
                        <p class="stat-card" style="text-align:center;color:var(--muted);">No matching emergency tickets found in the selected region.</p>
                    `;
                }
                return;
            }

            if (existingCards.length === 0 && container.children.length > 0 && container.children[0].tagName !== 'ARTICLE') {
                container.innerHTML = '';
            }

            tickets.forEach(ticket => {
                const id = safeText(ticket.id);
                const ticketIdStr = String(id);
                const priority = safeText(ticket.priority, 'MEDIUM').toUpperCase();
                const category = safeText(ticket.category, 'OTHER').toUpperCase();
                const status = safeText(ticket.status, 'OPEN').toUpperCase();
                const workerName = safeText(ticket.workerName || ticket.claimedBy || ticket.assignedWorker, 'Field responder');
                const region = safeText(getTicketRegion(ticket), 'Global');
                const summary = safeText(ticket.summary, 'Emergency logged.');
                const rawMessage = safeText(ticket.rawMessage, 'No raw SOS message captured.');
                const latitude = safeCoordinate(ticket.latitude);
                const longitude = safeCoordinate(ticket.longitude);
                const createdAt = ticket.timestamp ? new Date(ticket.timestamp).toLocaleString() : 'Pending timestamp';
                const isClaimed = status === 'CLAIMED';
                const priorityTone = getPriorityTone(priority);
                const slaTimerHtml = isClaimed
                    ? `<span class="sla-timer muted" aria-label="SLA timer"><span aria-hidden="true">⏱️</span> Handled</span>`
                    : `<span class="sla-timer" data-ticket-id="${escapeHtml(id)}" data-start="${Date.now()}" aria-label="SLA timer"><span aria-hidden="true">⏱️</span> Waiting: 0s</span>`;

                const nearest = getNearestDepot(Number(latitude), Number(longitude), region);
                const recommendation = getAssetRecommendation(category);

                const existingCard = container.querySelector(`article[data-ticket-id="${escapeAttr(ticketIdStr)}"]`);

                if (existingCard) {
                    updateExistingCard(existingCard, {
                        priority,
                        category,
                        status,
                        isClaimed,
                        workerName,
                        region,
                        summary,
                        rawMessage,
                        latitude,
                        longitude,
                        createdAt,
                        priorityTone,
                        id: ticketIdStr,
                        slaTimerHtml,
                        nearest,
                        recommendation
                    });
                } else {
                    ticketTimestamps[ticketIdStr] = Date.now();
                    const newCardHtml = `
                        <article class="incident-card ${priorityTone.card}" data-ticket-id="${escapeHtml(ticketIdStr)}">
                            <div>
                                <div class="meta-row">
                                    <span class="badge priority-pill ${priorityTone.badge}">${priority}</span>
                                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${category}</span>
                                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${region}</span>
                                </div>
                                <div>
                                    <h2>${category} Emergency Resource Request</h2>
                                    <p style="margin-top:8px;"><strong>AI Triage Verdict:</strong> ${summary}</p>
                                    <p style="margin-top:6px;"><strong>Raw SOS Message:</strong> "${rawMessage}"</p>
                                </div>
                                <div style="margin-top:12px">${slaTimerHtml}</div>
                                <div class="allocation-panel">
                                    <div class="allocation-text">
                                        <span>🚛 Nearest Depot: ${escapeHtml(nearest.depotName)}</span>
                                        <span style="color:#94a3b8; font-size:0.78rem;">${escapeHtml(nearest.distanceKm.toFixed(1))} km away</span>
                                    </div>
                                    <div class="recommendation-badge">${escapeHtml(recommendation)}</div>
                                </div>
                                <div class="mesh-relay-panel">
                                    ${renderMeshPanelHtml(ticketIdStr)}
                                </div>
                            </div>
                            <div class="actions">
                                ${status === 'OPEN' ? `<button type="button" onclick="claimTicket('${escapeJs(id)}')" class="btn btn-accept">Accept Incident</button>` : ''}
                                <button type="button" onclick="resolveTicket('${escapeJs(id)}')" class="btn btn-resolve">Mark Resolved</button>
                                <a href="https://www.google.com/maps/search/?api=1&query=${latitude},${longitude}" target="_blank" rel="noopener" class="btn btn-map">Map Location</a>
                            </div>
                            <div class="card-footer">
                                <div><span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Coordinates</span>${latitude}, ${longitude}</div>
                                <div><span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Created</span>${safeText(createdAt)}</div>
                                <div class="${isClaimed ? 'font-bold text-yellow-200' : ''}"><span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Status</span>${isClaimed ? `⚠️ Status: CLAIMED by ${workerName}` : `Status: ${status}`}</div>
                            </div>
                        </article>
                    `;
                    container.insertAdjacentHTML('beforeend', newCardHtml);
                }
            });
        }

        function updateExistingCard(card, data) {
            const { priority, category, status, isClaimed, workerName, region, summary, rawMessage, latitude, longitude, createdAt, priorityTone, id, slaTimerHtml, nearest, recommendation } = data;
            card.classList.remove('critical', 'medium', 'low');
            card.classList.add(priorityTone.card);
            const metaRow = card.querySelector('.meta-row');
            if (metaRow) {
                metaRow.innerHTML = `
                    <span class="badge priority-pill ${priorityTone.badge}">${priority}</span>
                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${category}</span>
                    <span class="badge" style="border:1px solid rgba(255,255,255,0.04);background:transparent">${region}</span>
                `;
            }

            const title = card.querySelector('h2'); if (title) title.textContent = `${category} Emergency Resource Request`;
            const triage = card.querySelector('p'); if (triage) triage.innerHTML = `<strong>AI Triage Verdict:</strong> ${summary}`;
            const rawP = card.querySelectorAll('p')[1]; if (rawP) rawP.innerHTML = `<strong>Raw SOS Message:</strong> "${rawMessage}"`;
            const allocationPanel = card.querySelector('.allocation-panel');
            if (allocationPanel) {
                allocationPanel.innerHTML = `
                    <div class="allocation-text">
                        <span>🚛 Nearest Depot: ${escapeHtml(nearest.depotName)}</span>
                        <span style="color:#94a3b8; font-size:0.78rem;">${escapeHtml(nearest.distanceKm.toFixed(1))} km away</span>
                    </div>
                    <div class="recommendation-badge">${escapeHtml(recommendation)}</div>
                `;
                // update or insert mesh panel directly after allocation panel
                const existingMesh = card.querySelector('.mesh-relay-panel');
                if (existingMesh) {
                    existingMesh.innerHTML = renderMeshPanelHtml(id);
                } else {
                    allocationPanel.insertAdjacentHTML('afterend', `<div class="mesh-relay-panel">${renderMeshPanelHtml(id)}</div>`);
                }
            }

            const footer = card.querySelector('.card-footer');
            if (footer) {
                const parts = footer.querySelectorAll('div');
                if (parts[0]) parts[0].innerHTML = `<span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Coordinates</span>${latitude}, ${longitude}`;
                if (parts[1]) parts[1].innerHTML = `<span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Created</span>${safeText(createdAt)}`;
                if (parts[2]) parts[2].innerHTML = `<span style="display:block;font-size:0.68rem;color:var(--muted);font-weight:800">Status</span>${isClaimed ? `⚠️ Status: CLAIMED by ${workerName}` : `Status: ${status}`}`;
            }

            const actions = card.querySelector('.actions');
            if (actions) {
                actions.innerHTML = `${status === 'OPEN' ? `<button type="button" onclick="claimTicket('${escapeJs(id)}')" class="btn btn-accept">Accept Incident</button>` : ''}` +
                    `<button type="button" onclick="resolveTicket('${escapeJs(id)}')" class="btn btn-resolve">Mark Resolved</button>` +
                    `<a href="https://www.google.com/maps/search/?api=1&query=${latitude},${longitude}" target="_blank" rel="noopener" class="btn btn-map">Map Location</a>`;
            }

            const slaContainer = card.querySelector('.sla-timer');
            if (slaContainer && !isClaimed) {
                slaContainer.setAttribute('data-start', `${ticketTimestamps[id] || Date.now()}`);
            }
        }

        async function claimTicket(id) {
            const workerName = prompt('Enter responder name to claim this incident:');
            if (!workerName || !workerName.trim()) {
                return;
            }

            try {
                const response = await fetch(`/api/tickets/${encodeURIComponent(id)}/claim?workerName=${encodeURIComponent(workerName.trim())}`, { method: 'POST' });
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                await fetchLiveQueue();
                await loadTacticalMatrixGrid();
            } catch (error) {
                console.error('Could not claim ticket.', error);
                alert('Could not claim this incident.');
            }
        }

        async function resolveTicket(id) {
            try {
                const response = await fetch(`${API_BASE}/api/tickets/${encodeURIComponent(id)}/resolve`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                await fetchLiveQueue();
                await loadTacticalMatrixGrid();
            } catch (error) {
                console.error('Could not process ticket resolution.', error);
                alert('Could not process ticket resolution.');
            }
        }

        async function loadTacticalMatrixGrid() {
            try {
                const response = await fetch(`/api/tickets/stats`);
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                const stats = await response.json();
                document.getElementById('statTotal').innerText = safeNumber(stats.totalActive ?? stats.total ?? lastFetchedTickets.length);
                document.getElementById('statCritical').innerText = stats.critical || 0;
                document.getElementById('statMedical').innerText = safeNumber(stats.medical);
            } catch (error) {
                console.error('Analytics fetch offline.', error);
            }
        }

        const updateAnalyticsCounters = loadTacticalMatrixGrid;

        function trackCriticalOpenTickets(tickets) {
            tickets.forEach(ticket => {
                if (!ticket || ticket.id === undefined || ticket.id === null) return;
                const id = String(ticket.id);
                const priority = safeText(ticket.priority).toUpperCase();
                const status = safeText(ticket.status, 'OPEN').toUpperCase();
                if (!knownOpenCriticalTicketIds.has(id) && priority === 'CRITICAL' && status === 'OPEN') playCriticalAlarm();
                if (priority === 'CRITICAL' && status === 'OPEN') knownOpenCriticalTicketIds.add(id);
            });
        }

        function getAlarmAudioContext() { const AudioContextClass = window.AudioContext || window.webkitAudioContext; if (!AudioContextClass) return null; if (!alarmAudioContext) alarmAudioContext = new AudioContextClass(); return alarmAudioContext; }

        function playCriticalAlarm() { const hasUserActivated = !navigator.userActivation || navigator.userActivation.hasBeenActive; if (!hasUserActivated) return; const audioContext = getAlarmAudioContext(); if (!audioContext) return; const scheduleAlarm = () => { const now = audioContext.currentTime; const masterGain = audioContext.createGain(); masterGain.gain.setValueAtTime(0.0001, now); masterGain.gain.exponentialRampToValueAtTime(0.2, now + 0.02); masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34); masterGain.connect(audioContext.destination); const highTone = audioContext.createOscillator(); highTone.type = 'sine'; highTone.frequency.setValueAtTime(920, now); highTone.frequency.exponentialRampToValueAtTime(460, now + 0.2); highTone.connect(masterGain); highTone.start(now); highTone.stop(now + 0.34); const lowTone = audioContext.createOscillator(); lowTone.type = 'triangle'; lowTone.frequency.setValueAtTime(680, now + 0.08); lowTone.frequency.exponentialRampToValueAtTime(340, now + 0.32); lowTone.connect(masterGain); lowTone.start(now + 0.08); lowTone.stop(now + 0.34); highTone.onended = () => masterGain.disconnect(); }; if (audioContext.state === 'suspended') { audioContext.resume().then(scheduleAlarm).catch(()=>{}); return;} scheduleAlarm(); }

        function getTicketRegion(ticket){ return ticket && (ticket.region || ticket.assignedRegion || ticket.ticketRegion || ticket.zone || ticket.locationRegion); }
        function normalizeRegion(value){return String(value||'').trim().toLowerCase();}

        function getPriorityTone(priority) {
            switch (priority){
                case 'CRITICAL': return { card: 'critical', badge: 'critical' };
                case 'LOW': return { card: 'low', badge: 'low' };
                default: return { card: 'medium', badge: 'medium' };
            }
        }

        function safeText(value, fallback=''){ if (value===undefined||value===null) return fallback; const text=String(value).trim(); return text===''?fallback:escapeHtml(text); }
        function safeNumber(value){ const number=Number(value); return Number.isFinite(number)?number:0; }
        function safeCoordinate(value){ const number=Number(value); return Number.isFinite(number)?number.toFixed(6):'0.000000'; }
        function escapeHtml(value){ return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function escapeJs(value){ return String(value).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
        function escapeAttr(value){ return String(value).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function formatSlaElapsed(totalSeconds){ totalSeconds = Math.max(0, Math.floor(totalSeconds)); if (totalSeconds < 60) return `Waiting: ${totalSeconds}s`; const m = Math.floor(totalSeconds/60); const s = totalSeconds % 60; return `Waiting: ${m}m ${s}s`; }

        function updateLiveSlaTimers(){
            const nowMs = Date.now();
            const timers = document.querySelectorAll('.sla-timer[data-start]');
            timers.forEach(timerEl => {
                const startAttr = timerEl.getAttribute('data-start');
                const ticketId = timerEl.getAttribute('data-ticket-id') || '';
                const startMs = Number(startAttr);
                if (!Number.isFinite(startMs)) return;
                if (ticketId){ if (ticketTimestamps[ticketId] === undefined){ ticketTimestamps[ticketId] = startMs; } }
                const effectiveStartMs = (ticketId && Number.isFinite(ticketTimestamps[ticketId])) ? ticketTimestamps[ticketId] : startMs;
                const elapsedSeconds = (nowMs - effectiveStartMs) / 1000;
                const formatted = formatSlaElapsed(elapsedSeconds);
                timerEl.innerHTML = `<span aria-hidden="true">⏱️</span> ${formatted}`;
                if (elapsedSeconds >= 180){ if (!timerEl.classList.contains('muted')){ timerEl.classList.add('sla-breach'); } } else { timerEl.classList.remove('sla-breach'); }
            });
            const slaBreachCount = document.querySelectorAll('.sla-timer.sla-breach').length;
            const slaBreachStat = document.getElementById('statSlaBreach');
            if (slaBreachStat) {
                slaBreachStat.innerText = slaBreachCount;
                slaBreachStat.style.color = slaBreachCount > 0 ? '#f59e0b' : 'var(--white)';
            }
        }

        const updateSlaTimers = updateLiveSlaTimers;
        setInterval(updateLiveSlaTimers,1000);

        // Mesh P2P Relay Simulator
        function deterministicHash(input) {
            let h = 2166136261 >>> 0;
            for (let i = 0; i < input.length; i++) {
                h ^= input.charCodeAt(i);
                h = Math.imul(h, 16777619) >>> 0;
            }
            return h;
        }

        function generateMeshPath(ticketId, lat = 0, lon = 0) {
            const idStr = String(ticketId || '0');
            const h = deterministicHash(idStr + '-mesh-' + String(lat) + ',' + String(lon));
            const priority = (h % 100) < 10 ? 'CRITICAL' : (h % 100) < 60 ? 'MEDIUM' : 'LOW';
            const nodes = [];
            const nodeCount = priority === 'CRITICAL' ? 2 + (h % 2) : 1;
            const names = ['Node-Alpha','Node-Beta','Node-Gamma','Node-Delta','Node-Echo','Node-Zeta'];
            let cumulativeLatency = 0;
            let cumulativeDistance = 0;
            // scale factor derived from coordinates to influence hop distances
            const latFrac = Math.abs(lat) % 1;
            const lonFrac = Math.abs(lon) % 1;
            const scale = 1 + ((latFrac + lonFrac) / 2);
            for (let i = 0; i < nodeCount; i++) {
                const pick = names[(h + i * 13) % names.length] + (i === 0 ? ' [Signal: Strong]' : (h % 3 === 0 ? ' [Signal: Muted]' : ' [Signal: Stable]'));
                const signalStrength = (50 + ((h >> (i+1)) % 51));
                const baseHopLatency = 10 + ((h >> i) % 90);
                const hopLatency = Math.max(5, Math.round(baseHopLatency / (signalStrength / 100)));
                const baseHopDistance = (1 + ((h >> (i+2)) % 40));
                const hopDistance = Math.round(baseHopDistance * scale * 10) / 10;
                cumulativeLatency += hopLatency;
                cumulativeDistance += hopDistance;
                nodes.push({ name: pick, latencyMs: hopLatency, distanceKm: hopDistance, strength: signalStrength });
            }
            // base node
            const baseLatency = Math.round(5 + (h % 20));
            cumulativeLatency += baseLatency;
            const baseDistance = Math.round((1 + (h % 20)) * scale * 10) / 10;
            nodes.push({ name: 'Base-Node', latencyMs: baseLatency, distanceKm: baseDistance, strength: 90 });
            return { nodes, cumulativeLatency, cumulativeDistance: Math.round(cumulativeDistance * 10) / 10, priority };
        }

        function renderMeshPanelHtml(ticketId, lat = 0, lon = 0) {
            const path = generateMeshPath(ticketId, Number(lat) || 0, Number(lon) || 0);
            const parts = [];
            parts.push(`<div class="mesh-chain">`);
            parts.push(`<span class="mesh-node-badge">📱 Citizen</span>`);
            const connectors = [];
            path.nodes.forEach((n, idx) => {
                const color = n.strength > 70 ? '#10b981' : (n.strength > 45 ? '#f59e0b' : '#f97316');
                parts.push(`<span class="mesh-connector" style="color:${color};">➔</span>`);
                parts.push(`<span class="mesh-node-badge"><span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:${color};margin-right:6px;"></span>${escapeHtml(n.name)}</span>`);
            });
            parts.push(`<span class="mesh-connector">➔</span>`);
            parts.push(`<span class="mesh-node-badge">💻 Command Base</span>`);
            parts.push(`</div>`);
            parts.push(`<div class="mesh-metrics"><span>Mesh Latency: ${escapeHtml(String(path.cumulativeLatency))}ms</span><span>Total Hop Distance: ${escapeHtml(String(path.cumulativeDistance))} km</span></div>`);
            return parts.join('');
        }

        loadTacticalMatrixGrid();
        fetchLiveQueue();
        setInterval(loadTacticalMatrixGrid,3000);
        setInterval(fetchLiveQueue,3000);
    </script>
