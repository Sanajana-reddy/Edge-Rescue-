<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGE-RESCUE Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    }
                }
            }
        };
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="relative min-h-screen overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(14,165,233,0.2),transparent_34%),radial-gradient(circle_at_bottom_right,rgba(239,68,68,0.18),transparent_32%)]"></div>
        <div class="absolute inset-0 bg-[linear-gradient(rgba(148,163,184,0.06)_1px,transparent_1px),linear-gradient(90deg,rgba(148,163,184,0.06)_1px,transparent_1px)] bg-[size:44px_44px]"></div>

        <section class="relative mx-auto flex min-h-screen w-full max-w-6xl flex-col justify-center px-5 py-10 sm:px-8">
            <div class="mb-10 max-w-3xl">
                <p class="mb-4 inline-flex rounded-full border border-cyan-400/30 bg-cyan-400/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-cyan-200">
                    Multi-region emergency response network
                </p>
                <h1 class="text-4xl font-black tracking-tight text-white sm:text-6xl lg:text-7xl">🚨 EDGE-RESCUE Matrix</h1>
                <p class="mt-5 max-w-2xl text-base leading-7 text-slate-300 sm:text-lg">
                    Route distress signals to the right response flow. Citizens transmit location-aware SOS reports, while responders monitor and claim live incidents from the command center.
                </p>
            </div>

            <div class="grid gap-5 md:grid-cols-2">
                <button
                    type="button"
                    onclick="window.location.href='citizen.html'"
                    class="group min-h-72 rounded-lg border border-red-400/30 bg-slate-900/80 p-7 text-left shadow-2xl shadow-red-950/20 backdrop-blur transition hover:-translate-y-1 hover:border-red-300/70 hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-red-300"
                >
                    <span class="mb-8 inline-flex h-14 w-14 items-center justify-center rounded-lg bg-red-500 text-2xl shadow-lg shadow-red-950/40">SOS</span>
                    <span class="block text-2xl font-black text-white sm:text-3xl">I Need Rescue</span>
                    <span class="mt-2 block text-lg font-semibold text-red-200">(Citizen Portal)</span>
                    <span class="mt-6 block text-sm leading-6 text-slate-300">
                        Send a distress message with browser hardware coordinates to create a live triage ticket.
                    </span>
                    <span class="mt-8 inline-flex items-center gap-2 text-sm font-bold text-red-200">
                        Open citizen portal
                        <span class="transition group-hover:translate-x-1">-&gt;</span>
                    </span>
                </button>

                <button
                    type="button"
                    onclick="window.location.href='dashboard.html'"
                    class="group min-h-72 rounded-lg border border-cyan-400/30 bg-slate-900/80 p-7 text-left shadow-2xl shadow-cyan-950/20 backdrop-blur transition hover:-translate-y-1 hover:border-cyan-300/70 hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-cyan-300"
                >
                    <span class="mb-8 inline-flex h-14 w-14 items-center justify-center rounded-lg bg-cyan-500 text-2xl font-black text-slate-950 shadow-lg shadow-cyan-950/40">OPS</span>
                    <span class="block text-2xl font-black text-white sm:text-3xl">I am a Responder</span>
                    <span class="mt-2 block text-lg font-semibold text-cyan-200">(Command Center)</span>
                    <span class="mt-6 block text-sm leading-6 text-slate-300">
                        Filter regions, inspect critical incidents, claim tickets, and clear resolved emergencies.
                    </span>
                    <span class="mt-8 inline-flex items-center gap-2 text-sm font-bold text-cyan-200">
                        Open command center
                        <span class="transition group-hover:translate-x-1">-&gt;</span>
                    </span>
                </button>
            </div>
        </section>
    </main>
</body>
</html>
