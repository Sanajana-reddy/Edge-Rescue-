spring.application.name=demo
# App Configuration
server.port=8082

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
# Explicitly specifying the lightweight model we downloaded
spring.ai.ollama.chat.options.model=llama3.2:1b

# H2 Embedded Database (file-based persistence)
spring.datasource.url=jdbc:h2:file:./data/edge-rescue;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
